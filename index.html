<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaiyangNews PV Price Index - SynapSun</title>
<link rel="icon" type="image/png" href="favicon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f8f9fa;color:#1a1a2e;padding:24px;max-width:1200px;margin:0 auto}
  h1{font-size:1.6rem;color:#1a1a2e;font-weight:600}
  .hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
  .logo{display:flex;align-items:center;gap:12px}
  .badge{background:#eef2ff;color:#4338ca;font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.03em}
  .hdr-right{display:flex;align-items:center;gap:12px}
  .synapsun-logo{height:36px}
  .lang-btn{padding:6px 14px;border:1px solid #e5e7eb;background:#fff;color:#4b5563;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
  .lang-btn:hover{background:#f3f4f6}
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
  .cb{padding:8px 18px;border:1px solid #e5e7eb;background:#fff;color:#4b5563;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s;font-weight:500}
  .cb:hover{background:#f3f4f6;border-color:#d1d5db}
  .cb.active{background:#2563eb;border-color:#2563eb;color:#fff}
  .date-filter{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
  .date-filter label{font-size:.78rem;color:#6b7280;font-weight:500}
  .date-filter input[type=date]{padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:.82rem;color:#4b5563;background:#fff}
  .cc{background:#fff;border-radius:14px;padding:24px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  canvas{max-height:480px}
  .leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .li{display:flex;align-items:center;gap:5px;font-size:.78rem;color:#6b7280;cursor:pointer;padding:4px 10px;border-radius:6px;background:#f9fafb;border:1px solid #f3f4f6;transition:all .2s}
  .li:hover{background:#f3f4f6}
  .li.hid{opacity:.35;text-decoration:line-through}
  .lc{width:14px;height:3px;border-radius:2px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}
  .sc{background:#fff;border-radius:10px;padding:16px;border:1px solid #e5e7eb}
  .sl{color:#9ca3af;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .sv{font-size:1.5rem;font-weight:700;color:#1a1a2e;margin-top:4px}
  .su{font-size:.75rem;color:#9ca3af;font-weight:400;margin-left:4px}
  .sch{font-size:.8rem;margin-top:3px}
  .down{color:#dc2626}.up{color:#16a34a}.flat{color:#9ca3af}
  .loading{text-align:center;padding:60px 20px;color:#9ca3af}
  .loading .spin{display:inline-block;width:24px;height:24px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{color:#dc2626;text-align:center;padding:40px;font-size:.9rem}
  .updated{color:#9ca3af;font-size:.72rem;text-align:right;margin-top:8px}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <h1>TaiyangNews PV Price Index</h1>
    <span class="badge">LIVE</span>
  </div>
  <div class="hdr-right">
    <a href="https://www.synapsun.com" target="_blank"><img src="logo.png" alt="SynapSun" class="synapsun-logo"></a>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>
</div>
<div id="stats" class="stats"></div>
<div class="controls" id="ctrls"></div>
<div class="cc">
  <div id="load" class="loading"><div class="spin"></div><br><span id="loadTxt">Chargement des donnees...</span></div>
  <canvas id="pc" style="display:none"></canvas>
  <div class="leg" id="leg"></div>
</div>
<div id="upd" class="updated"></div>
<p style="text-align:center;color:#9ca3af;font-size:.72rem;margin-top:12px">Source: <a href="https://taiyangnews.info/" target="_blank" style="color:#6b7280;text-decoration:underline">taiyangnews.info</a></p>

<script>
const SHEET_ID='1uZeF8NfStd_j7_rBL9pmAcT-RrOM4xQ7PE--Siekidw';
const PAL=['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#db2777','#0891b2','#ea580c','#0d9488','#9333ea','#e11d48','#65a30d','#0284c7','#c026d3','#f43f5e','#059669','#4f46e5','#ca8a04'];

const EXCLUDED=['Polysilicon RMB/kg (USD/kg) — Global (USD/kg)'];

const KPI_MAP={
  all:null,
  polysilicon:['N-Type Silicon in China','Granular Silicon','Chinese 9N','Reusable Chinese 9N'],
  wafer:['n-type 210mm, 130','n-type 182mm, 130'],
  cell:['TOPCon - n-type 182mm'],
  module:['TOPCon bifacial - n-type, 182mm, 72 cells'],
  glass:null
};

let lang='fr';
const I18N={
  fr:{all:'Tout',polysilicon:'Polysilicium',wafer:'Wafers',cell:'Cellules',module:'Modules',glass:'Verre solaire',
      from:'Du',to:'Au',week:'sem.',total:'periode',loading:'Chargement des donnees...',
      updated:'Derniere mise a jour',error:'Erreur de chargement',errorSub:'Verifiez que le Google Sheet est partage en lecture publique.'},
  en:{all:'All',polysilicon:'Polysilicon',wafer:'Wafers',cell:'Cells',module:'Modules',glass:'Solar glass',
      from:'From',to:'To',week:'week',total:'period',loading:'Loading data...',
      updated:'Last update',error:'Loading error',errorSub:'Check that the Google Sheet is shared for public reading.'}
};
function t(key){return I18N[lang][key]||key;}

let chart=null,hidden=new Set(),curCat='all',allData=null;
let dateStart=null,dateEnd=null;

function weekToDate(w){
  const m=w.match(/W(\d+)-(\d+)/);
  if(!m)return null;
  const year=+m[2],week=+m[1];
  const jan4=new Date(year,0,4);
  const d=new Date(jan4.getTime()+((week-1)*7-jan4.getDay()+1)*86400000);
  return d;
}

function parseCSV(txt){
  const ls=txt.trim().split('\n');
  const hdr=ls[0].split('","').map(h=>h.replace(/"/g,''));
  const weeks=hdr.slice(1);
  const dates=weeks.map(weekToDate);
  const prods=[];
  for(let i=1;i<ls.length;i++){
    if(!ls[i].trim())continue;
    const c=ls[i].split('","').map(x=>x.replace(/"/g,''));
    const name=c[0];
    if(EXCLUDED.some(ex=>name.includes(ex)))continue;
    prods.push({n:name,v:c.slice(1).map(x=>x===''?null:+x)});
  }
  return{weeks,dates,prods};
}

function getUnit(n){
  if(n.includes('RMB/kg'))return'RMB/kg';
  if(n.includes('RMB/piece'))return'RMB/pc';
  if(n.includes('RMB/W'))return'RMB/W';
  if(n.includes('RMB/m2'))return'RMB/m²';
  return'';
}

function matchChart(n,c){
  const l=n.toLowerCase();
  if(c==='all')return true;
  if(c==='polysilicon')return l.includes('polysilicon');
  if(c==='wafer')return l.includes('wafer');
  if(c==='cell')return l.includes('cell')&&!l.includes('module');
  if(c==='module')return l.includes('module');
  if(c==='glass')return l.includes('glass');
  return false;
}

function short(n){return n.replace(/Polysilicon RMB\/kg \(USD\/kg\) — /,'Poly: ').replace(/Wafer RMB\/piece — /,'Wafer: ').replace(/Cells RMB\/W — /,'Cell: ').replace(/Modules RMB\/W — /,'Mod: ').replace(/Solar Glass RMB\/m2 — /,'Glass: ');}

function getFilteredRange(){
  if(!allData)return{start:0,end:0};
  let si=0,ei=allData.weeks.length-1;
  if(dateStart){
    for(let i=0;i<allData.dates.length;i++){
      if(allData.dates[i]&&allData.dates[i]>=dateStart){si=i;break;}
    }
  }
  if(dateEnd){
    for(let i=allData.dates.length-1;i>=0;i--){
      if(allData.dates[i]&&allData.dates[i]<=dateEnd){ei=i;break;}
    }
  }
  if(si>ei)si=ei;
  return{start:si,end:ei};
}

function getKpiProducts(d){
  const kpiKeys=KPI_MAP[curCat];
  if(kpiKeys===null){
    return d.prods.filter(p=>matchChart(p.n,curCat)).slice(0,4);
  }
  const result=[];
  for(const key of kpiKeys){
    const found=d.prods.find(p=>p.n.includes(key));
    if(found)result.push(found);
  }
  return result;
}

function stats(d){
  const el=document.getElementById('stats');
  const{start,end}=getFilteredRange();
  const ps=getKpiProducts(d);
  el.innerHTML=ps.map(p=>{
    const sliced=p.v.slice(start,end+1);
    const vs=sliced.filter(v=>v!==null);
    if(!vs.length)return'';
    const cur=vs[vs.length-1];
    const first=vs[0];
    const unit=getUnit(p.n);
    let pw=0;
    if(vs.length>=2){
      const prev=vs[vs.length-2];
      pw=((cur-prev)/prev*100);
    }
    pw=pw.toFixed(1);
    const pt=first?((cur-first)/first*100).toFixed(1):'0.0';
    const cl=pw>0?'up':pw<0?'down':'flat';
    const ar=pw>0?'&#9650;':pw<0?'&#9660;':'&#9679;';
    return '<div class="sc"><div class="sl">'+short(p.n)+'</div><div class="sv">'+cur+'<span class="su">'+unit+'</span></div><div class="sch '+cl+'">'+ar+' '+pw+'% '+t('week')+' | '+pt+'% '+t('total')+'</div></div>';
  }).join('');
}

function draw(d){
  document.getElementById('pc').style.display='block';
  const{start,end}=getFilteredRange();
  const filteredWeeks=d.weeks.slice(start,end+1);
  const ps=d.prods.filter(p=>matchChart(p.n,curCat));
  const ds=ps.map((p,i)=>({label:short(p.n),data:p.v.slice(start,end+1),borderColor:PAL[i%PAL.length],backgroundColor:PAL[i%PAL.length]+'12',borderWidth:2,pointRadius:0,pointHoverRadius:4,tension:.3,hidden:hidden.has(p.n),spanGaps:true}));
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('pc'),{type:'line',data:{labels:filteredWeeks,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#1a1a2e',bodyColor:'#4b5563',borderColor:'#e5e7eb',borderWidth:1,padding:12,cornerRadius:8,titleFont:{weight:'600'}}},scales:{x:{ticks:{color:'#9ca3af',maxRotation:45,autoSkip:true,maxTicksLimit:18,font:{size:11}},grid:{color:'#f3f4f6'}},y:{ticks:{color:'#9ca3af',font:{size:11}},grid:{color:'#f3f4f6'}}}}});
  const leg=document.getElementById('leg');
  leg.innerHTML=ps.map((p,i)=>'<div class="li'+(hidden.has(p.n)?' hid':'')+'" data-n="'+p.n+'"><span class="lc" style="background:'+PAL[i%PAL.length]+'"></span>'+short(p.n)+'</div>').join('');
  leg.querySelectorAll('.li').forEach(el=>{el.onclick=()=>{const n=el.dataset.n;hidden.has(n)?hidden.delete(n):hidden.add(n);draw(d);}});
  stats(d);
}

function setDateLimits(){
  if(!allData)return;
  const validDates=allData.dates.filter(d=>d);
  if(!validDates.length)return;
  const minD=validDates[0].toISOString().slice(0,10);
  const maxD=validDates[validDates.length-1].toISOString().slice(0,10);
  const ds=document.getElementById('dStart');
  const de=document.getElementById('dEnd');
  if(ds){ds.setAttribute('min',minD);ds.setAttribute('max',maxD);}
  if(de){de.setAttribute('min',minD);de.setAttribute('max',maxD);}
}

function buildCats(){
  const cats={all:t('all'),polysilicon:t('polysilicon'),wafer:t('wafer'),cell:t('cell'),module:t('module'),glass:t('glass')};
  const el=document.getElementById('ctrls');
  let html=Object.entries(cats).map(([k,v])=>'<button class="cb'+(k===curCat?' active':'')+'" data-c="'+k+'">'+v+'</button>').join('');
  html+='<div class="date-filter"><label>'+t('from')+'</label><input type="date" id="dStart" '+(dateStart?'value="'+dateStart.toISOString().slice(0,10)+'"':'')+'><label>'+t('to')+'</label><input type="date" id="dEnd" '+(dateEnd?'value="'+dateEnd.toISOString().slice(0,10)+'"':'')+'></div>';
  el.innerHTML=html;
  el.querySelectorAll('.cb').forEach(b=>{b.onclick=()=>{curCat=b.dataset.c;hidden.clear();buildCats();setDateLimits();if(allData)draw(allData);}});
  document.getElementById('dStart').onchange=function(){dateStart=this.value?new Date(this.value):null;if(allData)draw(allData);};
  document.getElementById('dEnd').onchange=function(){dateEnd=this.value?new Date(this.value+'T23:59:59'):null;if(allData)draw(allData);};
  setDateLimits();
}

function toggleLang(){
  lang=lang==='fr'?'en':'fr';
  document.getElementById('langBtn').textContent=lang==='fr'?'EN':'FR';
  buildCats();
  if(allData){draw(allData);updateTimestamp();}
}

function updateTimestamp(){
  const now=new Date();
  const loc=lang==='fr'?'fr-FR':'en-GB';
  document.getElementById('upd').textContent=t('updated')+': '+now.toLocaleDateString(loc)+' '+now.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'});
}

buildCats();

fetch('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&gid=0')
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
  .then(csv=>{
    document.getElementById('load').style.display='none';
    allData=parseCSV(csv);
    setDateLimits();
    draw(allData);
    updateTimestamp();
  })
  .catch(e=>{
    document.getElementById('load').innerHTML='<div class="err">'+t('error')+': '+e.message+'<br><small>'+t('errorSub')+'</small></div>';
  });
</script>
</body>
</html>
