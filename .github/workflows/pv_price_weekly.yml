name: TaiyangNews PV Price Index

on:
  schedule:
    # Chaque vendredi à 08:00 UTC (TaiyangNews publie mercredi/jeudi)
    - cron: "0 8 * * 5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode d'exécution"
        required: false
        default: "weekly"
        type: choice
        options:
          - weekly
          - backfill
          - force
      week:
        description: "Semaine ISO à forcer (ex: 22) — weekly mode uniquement"
        required: false
        type: string
      year:
        description: "Année à forcer (ex: 2026) — weekly mode uniquement"
        required: false
        type: string

concurrency:
  group: pv-scraper
  cancel-in-progress: false

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r pv-price-scraper/requirements.txt

      - name: Run force rescrape (overwrite all weeks)
        if: ${{ github.event.inputs.mode == 'force' }}
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd pv-price-scraper && python backfill.py --force

      - name: Run backfill complet
        if: ${{ github.event.inputs.mode == 'backfill' }}
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd pv-price-scraper && python backfill.py

      - name: Run weekly scraper
        if: ${{ github.event.inputs.mode != 'backfill' && github.event.inputs.mode != 'force' }}
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.week }}" ]; then ARGS="$ARGS --week ${{ github.event.inputs.week }}"; fi
          if [ -n "${{ github.event.inputs.year }}" ]; then ARGS="$ARGS --year ${{ github.event.inputs.year }}"; fi
          cd pv-price-scraper && python taiyangnews_pv_scraper.py $ARGS
